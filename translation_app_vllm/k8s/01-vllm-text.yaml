apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-text
  labels:
    app: vllm-text
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-text
  template:
    metadata:
      labels:
        app: vllm-text
    spec:
      containers:
      - name: vllm
        image: vllm/vllm-openai:latest
        command: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
        args:
        - "--model"
        - "google/gemma-2-9b-it" 
        - "--served-model-name"
        - "gemma2:9b"
        - "--gpu-memory-utilization"
        - "0.85"
        - "--max-model-len"
        - "4096"
        - "--trust-remote-code"
        ports:
        - containerPort: 8000
        resources:
          limits:
            nvidia.com/gpu: "1"
        env:
        - name: HUGGING_FACE_HUB_TOKEN
          valueFrom:
             secretKeyRef:
               name: hf-secret
               key: token
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-text-service
spec:
  selector:
    app: vllm-text
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
